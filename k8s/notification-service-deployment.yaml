apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: tabatskyi/microservices-notification-service
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: ASPNETCORE_URLS
            - name: Migrations__ApplyOnStartup
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: Migrations__ApplyOnStartup
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: RabbitMq__Host
            - name: RabbitMq__Port
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: RabbitMq__Port
            - name: RabbitMq__VirtualHost
              valueFrom:
                configMapKeyRef:
                  name: notification-service-config
                  key: RabbitMq__VirtualHost
            - name: ConnectionStrings__NotificationDb
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ConnectionStrings__NotificationDb
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RabbitMq__Username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RabbitMq__Password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8080
      targetPort: http
