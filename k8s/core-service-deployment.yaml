apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
  labels:
    app: core-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-service
  template:
    metadata:
      labels:
        app: core-service
    spec:
      containers:
        - name: core-service
          image: tabatskyi/microservices-core-service
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: core-service-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: core-service-config
                  key: ASPNETCORE_URLS
            - name: Migrations__ApplyOnStartup
              valueFrom:
                configMapKeyRef:
                  name: core-service-config
                  key: Migrations__ApplyOnStartup
            - name: UsersService__BaseUrl
              valueFrom:
                configMapKeyRef:
                  name: core-service-config
                  key: UsersService__BaseUrl
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: core-service-config
                  key: RabbitMq__Host
            - name: RabbitMq__Port
              valueFrom:
                configMapKeyRef:
                  name: core-service-config
                  key: RabbitMq__Port
            - name: RabbitMq__VirtualHost
              valueFrom:
                configMapKeyRef:
                  name: core-service-config
                  key: RabbitMq__VirtualHost
            - name: ConnectionStrings__CoreDb
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ConnectionStrings__CoreDb
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RabbitMq__Username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RabbitMq__Password
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: core-service
  labels:
    app: core-service
spec:
  selector:
    app: core-service
  ports:
    - name: http
      port: 8080
      targetPort: http
