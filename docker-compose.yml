services:
  core-db:
    image: postgres:alpine
    container_name: core-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - core_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d core"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ./src
      dockerfile: CoreService/Dockerfile
    container_name: core-service
    restart: unless-stopped
    depends_on:
      core-db:
        condition: service_healthy
      users-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Migrations__ApplyOnStartup: "true"
      ConnectionStrings__CoreDb: Host=core-db;Port=5432;Database=core;Username=postgres;Password=postgres
      UsersService__BaseUrl: http://users-service:8080
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: admin
      RabbitMq__Password: admin
      RabbitMq__VirtualHost: /
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5000:8080"

  users-db:
    image: postgres:alpine
    container_name: users-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users"]
      interval: 10s
      timeout: 5s
      retries: 5

  users-service:
    build:
      context: ./src
      dockerfile: UsersService/Dockerfile
    container_name: users-service
    restart: unless-stopped
    depends_on:
      users-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Migrations__ApplyOnStartup: "true"
      ConnectionStrings__UsersDb: Host=users-db;Port=5432;Database=users;Username=postgres;Password=postgres
    ports:
      - "5001:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  gateway:
    build:
      context: ./src
      dockerfile: Gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    depends_on:
      core-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  core_db_data:
  users_db_data:
  rabbitmq_data: